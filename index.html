<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nomad Intelligence Concierge</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #f59e0b; }
        
        #chat-hub {
            height: 220px; 
            transition: all 0.9s cubic-bezier(0.16, 1, 0.3, 1);
            width: 94vw;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            position: relative;
            transform: scale(1);
        }

        #chat-hub.is-expanded { 
            height: 85vh; 
            max-width: 950px; 
            border-radius: 3rem; 
            justify-content: flex-start;
            transform: scale(1.01);
        }

        #text-stage { 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            padding: 0 1.5rem;
            z-index: 50;
            opacity: 1;
            transition: opacity 0.8s, transform 0.8s;
        }
        
        #hook-text {
            font-size: 1.1rem;
            line-height: 1.05;
            min-height: 2em;
            letter-spacing: -0.01em;

        }

        #chat-hub.is-expanded #text-stage { 
            display: none; 
        }

        @media (max-width: 640px) {
            #hook-text {
                font-size: 1rem !important;
                line-height: 1.05;
                min-height: 2em;
            }
            #sub-text {
                font-size: 7px !important;
                margin-top: 0.1rem !important;
            }
        }

        .aurora-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.12) 0%, transparent 70%);
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
        }

        .avatar-box { 
            width: 48px; height: 48px; flex-shrink: 0; border-radius: 14px; 
            background: white; border: 1.5px solid rgba(255,255,255,1); padding: 5px; 
            position: relative; z-index: 10;
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: contain; }
        
        .avatar-glow-ring {
            position: absolute; inset: -3px; border-radius: 17px;
            background: linear-gradient(45deg, var(--accent), transparent, var(--accent));
            opacity: 0.4; animation: rotateGlow 4s linear infinite;
        }
        @keyframes rotateGlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .shimmer-word {
            background: linear-gradient(120deg, #0f172a 20%, #f59e0b 50%, #0f172a 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s infinite linear;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .input-pulse {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            width: 40px; height: 40px; background: radial-gradient(circle, rgba(245, 158, 11, 0.15) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; animation: softPulse 3s ease-in-out infinite; z-index: 55;
        }
        @keyframes softPulse { 0%, 100% { opacity: 0.2; transform: translateY(-50%) scale(1); } 50% { opacity: 0.8; transform: translateY(-50%) scale(1.3); } }

        #status-bar { 
            display: flex; opacity: 0; height: 0; transition: 0.5s ease; 
            align-items: center; justify-content: space-between;
            padding: 0 1.75rem; font-size: 10px; font-weight: 800; color: #475569; letter-spacing: 0.15em;
        }
        #chat-hub.is-expanded #status-bar { opacity: 1; height: 44px; margin-bottom: 0.5rem; }

        #history-container { height: 0; opacity: 0; transition: all 0.6s ease; overflow-y: auto; flex-grow: 1; }
        #chat-hub.is-expanded #history-container { opacity: 1; padding: 1rem 0; }

        .input-container-wrapper {
            padding: 1.25rem;
            padding-top: 0;
            position: relative;
            z-index: 60;
        }
    </style>
</head>
<body class="bg-transparent overflow-hidden">
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full flex justify-center px-4 z-50">
        <div id="chat-hub" class="glass-panel rounded-[3.5rem] shadow-2xl border border-white/80">
            <div class="aurora-glow top-0 left-0"></div>
            <div class="aurora-glow bottom-0 right-0" style="background: radial-gradient(circle, rgba(30, 58, 138, 0.04) 0%, transparent 70%);"></div>

            <div class="flex flex-col">
                <div id="status-bar" class="uppercase">
                    <div class="flex items-center gap-4">
                        <span id="live-clock">--:-- --</span>
                        <span class="flex items-center gap-1.5"><span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></span> LIVE</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="tracking-[0.2em]">DA NANG</span>
                        <span class="opacity-20">/</span>
                        <span>28°C</span>
                    </div>
                </div>

                <header class="relative z-50 flex items-center justify-between w-full p-6 pb-2">
                    <div class="flex items-center gap-4">
                        <div class="avatar-box shadow-xl">
                            <div class="avatar-glow-ring"></div>
                            <img src="./public/dnf-logo.jpg" alt="AI">
                        </div>
                        <div>
                            <h1 class="text-sm font-display font-bold text-slate-900 tracking-tight uppercase">Nomad Chatbot</h1>
                        </div>
                    </div>
                    <button id="minimize-btn" class="hidden p-3 hover:bg-slate-900/5 rounded-full transition-all group">
                        <svg class="group-hover:rotate-90 transition-transform duration-300" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </header>
            </div>

            <div id="history-container" class="custom-scrollbar px-8 md:px-12">
                <div id="chat-history" class="flex flex-col gap-6 pb-4"></div>
                <div id="typing" class="hidden pb-8">
                    <div class="flex items-center gap-2 px-5 py-3 bg-white/80 rounded-2xl w-fit border border-white">
                        <div class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-bounce"></div>
                        <div class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                    </div>
                </div>
            </div>

            <div id="text-stage">
                <div id="hook-text" class="font-bold text-slate-800 text-center leading-snug"></div>
                <div id="sub-text" class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.3em] mt-1.5 text-center"></div>
            </div>

            <div class="input-container-wrapper">
                <div id="chips-area" class="flex gap-2.5 overflow-x-auto no-scrollbar mb-4 opacity-0 h-0 transition-all duration-700">
                    <div class="chip" onclick="handleChip('Things to do in Da Nang')">Things to do in Da Nang</div>
                    <div class="chip" onclick="handleChip('What’s happening tonight?')">Tonight’s Events</div>
                    <div class="chip" onclick="handleChip('Best places to work from')">Work Spots</div>
                    <div class="chip" onclick="handleChip('I need help finding people')">Find People</div>
                </div>

                <form id="chat-form" class="max-w-3xl mx-auto relative">
                    <div class="flex items-center bg-white border border-slate-200/60 rounded-full shadow-lg focus-within:border-amber-400 transition-all duration-300">
                        <input type="text" id="user-input" autocomplete="off" placeholder="Ask me anything..." 
                               class="w-full bg-transparent py-4 px-8 text-base focus:outline-none placeholder-slate-400 text-slate-900">
                        <div class="relative flex items-center">
                            <div class="input-pulse" id="cta-glow"></div>
                            <button type="submit" class="mr-2 p-3 bg-slate-900 text-amber-400 rounded-full hover:scale-105 active:scale-95 transition-all relative z-10">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script type="module" src="/src/chat.js"></script>
</body>
</html>
